<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Remarcaviar</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Jost:wght@200;300;400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: #fff;
            color: #111;
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            cursor: none;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #cur {
            width: 7px;
            height: 7px;
            background: #111;
            border-radius: 50%;
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

        #cur-ring {
            width: 28px;
            height: 28px;
            border: 1px solid rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            background: rgba(255, 255, 255, .95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, .08);
        }

        .nav-top {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 48px;
            position: relative;
        }

        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-size: 1.6rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: #111;
            text-decoration: none;
        }

        .nav-bottom {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 56px;
            padding: 11px 48px;
            border-top: 1px solid rgba(0, 0, 0, .06);
        }

        .nav-bottom a {
            font-size: .65rem;
            font-weight: 400;
            letter-spacing: .28em;
            text-transform: uppercase;
            color: #555;
            text-decoration: none;
            transition: color .2s;
            position: relative;
        }

        .nav-bottom a::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 0;
            height: 1px;
            background: #111;
            transition: width .3s;
        }

        .nav-bottom a:hover,
        .nav-bottom a.active {
            color: #111;
        }

        .nav-bottom a:hover::after,
        .nav-bottom a.active::after {
            width: 100%;
        }

        .nav-spacer {
            height: 104px;
        }

        .contact-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
        }

        .contact-eyebrow {
            font-size: .6rem;
            font-weight: 400;
            letter-spacing: .38em;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            opacity: 0;
            animation: fadeUp .8s .1s forwards;
        }

        .contact-eyebrow::before {
            content: '';
            width: 24px;
            height: 1px;
            background: #ccc;
        }

        .contact-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 7vw, 6rem);
            font-weight: 300;
            color: #111;
            letter-spacing: -.01em;
            line-height: 1;
            margin-bottom: 48px;
            text-align: center;
            opacity: 0;
            animation: fadeUp .8s .25s forwards;
        }

        .contact-title em {
            font-style: italic;
            color: #888;
            display: block;
        }

        .contact-card {
            max-width: 560px;
            width: 100%;
            border: 1px solid rgba(0, 0, 0, .1);
            padding: 56px 64px;
            text-align: center;
            opacity: 0;
            animation: fadeUp .8s .4s forwards;
        }

        .contact-desc {
            font-size: 1rem;
            font-weight: 300;
            color: #666;
            line-height: 1.95;
            margin-bottom: 40px;
        }

        .contact-divider {
            width: 40px;
            height: 1px;
            background: rgba(0, 0, 0, .15);
            margin: 0 auto 40px;
        }

        .contact-email-label {
            font-size: .6rem;
            font-weight: 400;
            letter-spacing: .3em;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 14px;
        }

        .contact-email {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 400;
            color: #111;
            text-decoration: none;
            letter-spacing: .04em;
            border-bottom: 1px solid rgba(0, 0, 0, .2);
            padding-bottom: 4px;
            transition: border-color .3s, color .3s;
            display: inline-block;
        }

        .contact-email:hover {
            color: #555;
            border-color: #555;
        }

        footer {
            padding: 36px 72px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(0, 0, 0, .08);
        }

        .footer-logo {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: #111;
            text-decoration: none;
        }

        .footer-copy {
            font-size: .62rem;
            font-weight: 300;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: #aaa;
        }

        .footer-links {
            display: flex;
            gap: 32px;
        }

        .footer-links a {
            font-size: .62rem;
            font-weight: 300;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: #aaa;
            text-decoration: none;
            transition: color .2s;
        }

        .footer-links a:hover {
            color: #111;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @media(max-width:768px) {
            .nav-top {
                padding: 16px 20px
            }

            .nav-bottom {
                gap: 24px;
                padding: 10px 20px
            }

            .nav-spacer {
                height: 92px
            }

            .contact-wrap {
                padding: 60px 24px
            }

            .contact-card {
                padding: 40px 28px
            }

            .contact-title {
                font-size: clamp(2.5rem, 9vw, 4rem)
            }

            .contact-desc {
                font-size: 1rem
            }

            footer {
                flex-direction: column;
                gap: 16px;
                text-align: center;
                padding: 28px 24px
            }

            .footer-links {
                justify-content: center
            }
        }
    </style>
</head>

<body>
    <div id="cur"></div>
    <div id="cur-ring"></div>
    <nav>
        <div class="nav-top"><a href="index.html" class="nav-logo">Remarcaviar</a></div>
        <div class="nav-bottom">
            <a href="blogs.html">Blogs</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>
    <div class="nav-spacer"></div>
    <div class="contact-wrap">
        <div class="contact-eyebrow">Get in Touch</div>
        <h1 class="contact-title">Let's <em>Connect</em></h1>
        <div class="contact-card">
            <p class="contact-desc">For collaborations, editorial opportunities, or brand inquiries, reach out directly.
            </p>
            <div class="contact-divider"></div>
            <div class="contact-email-label">Email</div>
            <a href="mailto:remarcaviar@gmail.com" class="contact-email">remarcaviar@gmail.com</a>
        </div>
    </div>
    <footer>
        <a href="index.html" class="footer-logo">Remarcaviar</a>
        <span class="footer-copy">© 2026 Remarcaviar</span>
        <div class="footer-links">
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </footer>
    <script>
        const cur = document.getElementById('cur'), ring = document.getElementById('cur-ring');
        let mx = 0, my = 0, rx = 0, ry = 0;
        document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cur.style.left = mx + 'px'; cur.style.top = my + 'px'; });
        (function loop() { rx += (mx - rx) * .1; ry += (my - ry) * .1; ring.style.left = rx + 'px'; ring.style.top = ry + 'px'; requestAnimationFrame(loop); })();
    </script>
</body>

</html>
